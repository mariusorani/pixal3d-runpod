name: Build RunPod Images

on:
  workflow_dispatch:
    inputs:
      worker:
        description: "Which image to build"
        required: true
        default: "direct"
        type: choice
        options:
          - direct
          - comfy
          - both

permissions:
  contents: read
  packages: write

jobs:
  build-direct:
    if: ${{ github.event.inputs.worker == 'direct' || github.event.inputs.worker == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-direct:latest
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-direct:hf-token-fix
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-direct:a40-naf-fallback
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-direct:a40-sm86-natten
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-direct:${{ github.sha }}

  build-comfy:
    if: ${{ github.event.inputs.worker == 'comfy' || github.event.inputs.worker == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker-comfy
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-comfy:latest
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-comfy:hf-token-fix
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-comfy:a40-naf-fallback
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-comfy:a40-sm86-natten
            ghcr.io/${{ github.repository_owner }}/pixal3d-runpod-comfy:${{ github.sha }}
